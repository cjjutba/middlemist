services:
  postgres:
    image: postgres:16-alpine
    container_name: middlemist-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: middlemist
      POSTGRES_PASSWORD: middlemist
      POSTGRES_DB: middlemist_dev
    volumes:
      - middlemist_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U middlemist -d middlemist_dev']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: middlemist-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - middlemist_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: middlemist-mailpit
    restart: unless-stopped
    ports:
      - '1026:1025'
      - '8026:8025'
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
    volumes:
      - middlemist_mailpit_data:/data

volumes:
  middlemist_postgres_data:
  middlemist_redis_data:
  middlemist_mailpit_data:
